openapi: 3.0.3
info:
  title: PDF Tool API
  description: API REST para manipulación de archivos PDF en memoria.
  version: 1.0.0

paths:
  /api/upload/:
    post:
      summary: Validar y subir un PDF
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required: [file]
      responses:
        "200":
          description: PDF válido
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: {type: string}
                  num_paginas: {type: integer}
        "400":
          description: Archivo inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/merge/:
    post:
      summary: Unir múltiples PDFs
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items: {type: string, format: binary}
              required: [files]
      responses:
        "200":
          description: PDF resultante
          content:
            application/pdf:
              schema: {type: string, format: binary}
        "400": {$ref: "#/components/responses/Error400"}
        "429": {$ref: "#/components/responses/Error429"}

  /api/split/:
    post:
      summary: Extraer páginas de un PDF
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: {type: string, format: binary}
                paginas: {type: string, example: "1-3,5"}
              required: [file]
      responses:
        "200":
          description: PDF con páginas extraídas
          content:
            application/pdf:
              schema: {type: string, format: binary}
        "400": {$ref: "#/components/responses/Error400"}
        "429": {$ref: "#/components/responses/Error429"}

  /api/rotate/:
    post:
      summary: Rotar páginas de un PDF
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: {type: string, format: binary}
                angulo: {type: integer, example: 90}
                paginas: {type: string, example: "1,3"}
              required: [file, angulo]
      responses:
        "200":
          description: PDF rotado
          content:
            application/pdf:
              schema: {type: string, format: binary}
        "400": {$ref: "#/components/responses/Error400"}
        "429": {$ref: "#/components/responses/Error429"}

  /api/watermark/:
    post:
      summary: Agregar marca de agua
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: {type: string, format: binary}
                texto: {type: string, example: "CONFIDENCIAL"}
                opacidad: {type: number, example: 0.3}
                posicion: {type: string, example: "center"}
              required: [file, texto]
      responses:
        "200":
          description: PDF con marca de agua
          content:
            application/pdf:
              schema: {type: string, format: binary}
        "400": {$ref: "#/components/responses/Error400"}
        "429": {$ref: "#/components/responses/Error429"}

  /api/generate/:
    post:
      summary: Generar PDF desde JSON
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: {type: string}
                sections:
                  type: array
                  items:
                    type: object
                    properties:
                      type: {type: string, enum: [text, table]}
                      content: {type: string}
                      headers: {type: array, items: {type: string}}
                      rows: {type: array, items: {type: array}}
      responses:
        "200":
          description: PDF generado
          content:
            application/pdf:
              schema: {type: string, format: binary}
        "400": {$ref: "#/components/responses/Error400"}
        "429": {$ref: "#/components/responses/Error429"}

components:
  schemas:
    Error:
      type: object
      properties:
        error: {type: string}

  responses:
    Error400:
      description: Parámetros inválidos
      content:
        application/json:
          schema: {$ref: "#/components/schemas/Error"}
    Error429:
      description: Rate limit excedido
      content:
        application/json:
          schema: {$ref: "#/components/schemas/Error"}